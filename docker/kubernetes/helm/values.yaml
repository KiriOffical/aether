# Default values for A.E.T.H.E.R. Node
replicaCount: 3

image:
  repository: aether-node
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 7821

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

# A.E.T.H.E.R. configuration
aether:
  port: 7821
  logLevel: INFO
  maxConnections: 1000
  bootstrapPeers: []
  # - address: "node1.example.com"
  #   port: 7821

# Persistent storage
persistence:
  enabled: true
  size: 10Gi
  storageClass: ""
  accessModes:
    - ReadWriteOnce

# Node affinity
affinity: {}

# Tolerations
tolerations: []

# Node selector
nodeSelector: {}

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  fsGroup: 1000

# Container security context
securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: false
  capabilities:
    drop:
      - ALL

# Health checks
healthCheck:
  liveness:
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

# Monitoring
monitoring:
  enabled: false
  serviceMonitor:
    enabled: false
    interval: 30s
